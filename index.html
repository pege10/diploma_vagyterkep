<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Holistic Search Engine</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <!-- Sötét szín: az Android Chrome sáv beleolvad a designba -->
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="Holistic Search Engine — magyarországi település kereső erdei magány és kulturális pezsgés alapján." />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- black-translucent: iOS-on a status bar átlátszó, az app tartalom alatta folytatódik -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Holistic Search">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <link href="https://unpkg.com/maplibre-gl@3/dist/maplibre-gl.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=15">
  <!-- Touch érzékelés: class kerül a html elemre MIELŐTT a CSS renderelődik, nincs FOUC -->
  <script>if('ontouchstart' in window||navigator.maxTouchPoints>0){document.documentElement.classList.add('is-touch');}</script>
</head>
<body>
  <aside class="sidebar">
    <h1 class="sidebar-title">Holistic Search Engine</h1>

    <div class="control-group">
      <div class="control-label-row">
        <label for="erdo_szint" class="control-label">Erdei magány</label>
        <button type="button" id="pick-erdo-btn" class="pick-map-btn" aria-pressed="false" aria-label="Referencia település kijelölése a térképen (erdei magány)" title="Térképen">
          <span class="material-symbols-outlined" aria-hidden="true">pin_drop</span>
        </button>
      </div>
      <div class="ref-city-row">
        <input type="text" id="erdo-ref-city" class="ref-city-input" placeholder="vagy írd be a település nevét…" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="Referencia település neve (erdei magány)">
        <button type="button" id="erdo-ref-apply" class="ref-city-apply">Alkalmaz</button>
      </div>
      <p id="erdo-ref-line" class="ref-line" hidden></p>
      <div class="slider-row">
        <input type="range" id="erdo_szint" class="slider" min="0" max="100" value="50">
        <span id="erdo_szint-value" class="slider-value">50</span>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label-row">
        <label for="kultura_szint" class="control-label">Kulturális pezsgés</label>
        <button type="button" id="pick-kultura-btn" class="pick-map-btn" aria-pressed="false" aria-label="Referencia település kijelölése a térképen (kultúra)" title="Térképen">
          <span class="material-symbols-outlined" aria-hidden="true">pin_drop</span>
        </button>
      </div>
      <div class="ref-city-row">
        <input type="text" id="kultura-ref-city" class="ref-city-input" placeholder="vagy írd be a település nevét…" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="Referencia település neve (kulturális pezsgés)">
        <button type="button" id="kultura-ref-apply" class="ref-city-apply">Alkalmaz</button>
      </div>
      <p id="kultura-ref-line" class="ref-line" hidden></p>
      <div class="slider-row">
        <input type="range" id="kultura_szint" class="slider" min="0" max="100" value="50">
        <span id="kultura_szint-value" class="slider-value">50</span>
      </div>
    </div>

    <button type="button" id="search-btn" class="search-btn">Tökéletes hely keresése</button>

    <div id="result-box" class="result-box" aria-live="polite"></div>
  </aside>

  <main id="map-container" class="map-container" aria-label="Térkép"></main>

  <div id="map-picking-banner" class="map-picking-banner" hidden role="status">
    <p id="map-picking-banner-text" class="map-picking-banner-text"></p>
    <button type="button" id="map-picking-cancel" class="map-picking-cancel">Mégse</button>
  </div>

  <!-- Indítóképernyő – csak mobilon látható, koppintásra fullscreen + eltűnik -->
  <div id="start-overlay" class="start-overlay">
    <div class="start-content">
      <p class="start-title">Holistic Search Engine</p>
      <p class="start-subtitle">Magyarországi település kereső</p>
      <div class="start-tap-hint">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 1 0 10 10"/><polyline points="22 2 22 8 16 8"/>
        </svg>
        <span>Koppints az indításhoz</span>
      </div>
    </div>
  </div>

  <!-- Sorszám overlay – csak mobilon látható (CSS dönti el); bezárás: háttérre koppintás -->
  <div id="ticket-overlay" class="ticket-overlay" role="dialog" aria-modal="true" aria-labelledby="ticket-heading" aria-describedby="ticket-hint" hidden>
    <div class="ticket-card">
      <p id="ticket-heading" class="ticket-heading">A te sorszámod</p>
      <p id="ticket-number" class="ticket-number">–</p>
      <p id="ticket-hint" class="ticket-hint">
        Ha látod a sorszámodat a kivetítőn, dobj egyet a darts táblára — így derül ki, mi számodra a tökéletes hely.
      </p>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@3/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="app.js?v=15"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker
          .register('/service-worker.js')
          .then(function (reg) {
            console.log('Service Worker regisztrálva:', reg.scope);
          })
          .catch(function (err) {
            console.warn('Service Worker regisztráció sikertelen:', err);
          });
      });
    }
  </script>
</body>
</html>
