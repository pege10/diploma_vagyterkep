<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HOVA?! - A tökéletes hely</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <!-- Sötét szín: az Android Chrome sáv beleolvad a designba -->
  <meta name="theme-color" content="#0f0f12">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- black-translucent: iOS-on a status bar átlátszó, az app tartalom alatta folytatódik -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Darts">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <link href="https://unpkg.com/maplibre-gl@3/dist/maplibre-gl.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside class="sidebar">
    <h1 class="sidebar-title">HOVA?! - A tökéletes hely</h1>

    <div class="control-group">
      <label for="erdo_szint" class="control-label">Erdei magány</label>
      <div class="slider-row">
        <input type="range" id="erdo_szint" class="slider" min="0" max="100" value="50">
        <span id="erdo_szint-value" class="slider-value">50</span>
      </div>
    </div>

    <div class="control-group">
      <label for="kultura_szint" class="control-label">Kulturális pezsgés</label>
      <div class="slider-row">
        <input type="range" id="kultura_szint" class="slider" min="0" max="100" value="50">
        <span id="kultura_szint-value" class="slider-value">50</span>
      </div>
    </div>

    <button type="button" id="search-btn" class="search-btn">Tökéletes hely keresése</button>

    <div id="result-box" class="result-box" aria-live="polite"></div>
  </aside>

  <main id="map-container" class="map-container" aria-label="Térkép"></main>

  <!-- Teljes képernyő gomb – jobb felső sarok -->
  <button type="button" id="fullscreen-btn" class="fullscreen-btn" title="Teljes képernyő">
    <svg id="fs-icon-expand" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
      <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
    </svg>
    <svg id="fs-icon-collapse" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
      <line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>
    </svg>
  </button>

  <!-- Sorszám overlay – csak mobilon látható (CSS dönti el) -->
  <div id="ticket-overlay" class="ticket-overlay" role="alertdialog" aria-modal="true" aria-label="A te sorszámod" hidden>
    <div class="ticket-card">
      <p class="ticket-label">A te sorszámod:</p>
      <p id="ticket-number" class="ticket-number">–</p>
      <button type="button" id="ticket-close" class="ticket-close">Bezár ✕</button>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@3/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker
          .register('/service-worker.js')
          .then(function (reg) {
            console.log('Service Worker regisztrálva:', reg.scope);
          })
          .catch(function (err) {
            console.warn('Service Worker regisztráció sikertelen:', err);
          });
      });
    }
  </script>
</body>
</html>
